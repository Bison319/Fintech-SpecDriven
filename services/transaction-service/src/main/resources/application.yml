server:
  port: 8083

spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/transactions_db
    username: ${DB_USERNAME:fintech}
    password: ${DB_PASSWORD:fintech_secret}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

feign:
  client:
    config:
      wallet-service:
        url: http://${WALLET_SERVICE_HOST:localhost}:${WALLET_SERVICE_PORT:8082}
        connect-timeout: 3000
        read-timeout: 5000
      fraud-service:
        url: http://${FRAUD_SERVICE_HOST:localhost}:${FRAUD_SERVICE_PORT:8084}
        connect-timeout: 3000
        read-timeout: 5000

resilience4j:
  circuitbreaker:
    instances:
      walletService:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
      fraudService:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
  retry:
    instances:
      walletService:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
      fraudService:
        max-attempts: 2
        wait-duration: 300ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  rabbitmq:
    exchange: fintech-events
    transaction-completed-queue: transaction.completed
    transaction-failed-queue: transaction.failed

logging:
  level:
    com.fintech.transaction: DEBUG
    org.springframework.web: INFO
    io.github.resilience4j: DEBUG
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%level","service":"transaction-service","correlationId":"%X{correlationId}","logger":"%logger{36}","message":"%msg"}%n'
