server:
  port: 8082

spring:
  application:
    name: wallet-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/wallets_db
    username: ${DB_USERNAME:fintech}
    password: ${DB_PASSWORD:fintech_secret}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

feign:
  client:
    config:
      user-service:
        url: http://${USER_SERVICE_HOST:localhost}:${USER_SERVICE_PORT:8081}
        connect-timeout: 3000
        read-timeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.fintech.wallet: DEBUG
    org.springframework.web: INFO
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%level","service":"wallet-service","correlationId":"%X{correlationId}","logger":"%logger{36}","message":"%msg"}%n'
