server:
  port: 8084

spring:
  application:
    name: fraud-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/fraud_db
    username: ${DB_USERNAME:fintech}
    password: ${DB_PASSWORD:fintech_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

app:
  fraud:
    high-amount-threshold: 10000.00
    very-high-amount-threshold: 50000.00
    velocity-window-seconds: 60
    velocity-max-transactions: 10
    velocity-warning-transactions: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.fintech.fraud: DEBUG
    org.springframework.web: INFO
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%level","service":"fraud-service","correlationId":"%X{correlationId}","logger":"%logger{36}","message":"%msg"}%n'
